<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sona ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e8,#fff5fa);
overflow:hidden;
}

.card{

width:90%;
max-width:700px;

padding:50px;

text-align:center;

background:rgba(255,255,255,.25);

backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:
0 15px 40px rgba(255,79,139,.25);

animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}
}

h1{

font-size:58px;
color:#ff4f8b;

margin-bottom:20px;

text-shadow:
0 0 20px rgba(255,79,139,.4);
}

.message{

font-size:28px;

line-height:1.8;

color:#444;
}

#yesBtn{

margin-top:35px;

padding:18px 45px;

font-size:24px;

border:none;

border-radius:50px;

background:linear-gradient(
135deg,
#ff4f8b,
#ff77a9
);

color:white;

cursor:pointer;

box-shadow:
0 10px 30px rgba(255,79,139,.4);

transition:.3s;
}

#yesBtn:hover{
transform:scale(1.1);
}

.heart{

position:fixed;

top:-20px;

pointer-events:none;

animation:fall linear infinite;
}

@keyframes fall{

to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="card">

<h1>❤️ Oii Sona ❤️</h1>

<p class="message">

Ekta chhoto proshno chilo... 🥺

<br><br>

💍 Amar Bou Hoba? 💍

</p>

<button id="yesBtn">

YES ❤️

</button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(15+Math.random()*30)+"px";

heart.style.animation=
"fall "+(3+Math.random()*6)+"s linear infinite";

document.body.appendChild(heart);
}

/* YES Click */

document
.getElementById("yesBtn")
.onclick=function(){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(
135deg,
#ff9ecf,
#ffd6e8
);
">

<h1 style="
font-size:80px;
color:#ff4f8b;
">
🎉 YAYYYY 🎉
</h1>

<h2 style="
font-size:40px;
margin-top:20px;
">
❤️ Bipul + Sanchari ❤️
</h2>

<p style="
font-size:28px;
margin-top:30px;
line-height:1.8;
max-width:700px;
">

Official Status Updated ✅

From Today...

Forever Together ♾️

💍❤️🥰

</p>

</div>

`;
};

</script>

</body>
</html>
