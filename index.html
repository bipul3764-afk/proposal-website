<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sona ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e8,#fff5fa);
overflow:hidden;
padding:20px;
}

.card{

position:relative;

width:100%;
max-width:800px;

padding:50px 35px;

text-align:center;

background:rgba(255,255,255,.25);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.3);

border-radius:30px;

box-shadow:
0 15px 40px rgba(255,79,139,.25);

animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}
}

h1{

font-size:clamp(2rem,5vw,4rem);

color:#ff4f8b;

margin-bottom:15px;

text-shadow:
0 0 20px rgba(255,79,139,.4);
}

.subtitle{

font-size:clamp(1rem,3vw,1.4rem);

color:#555;

margin-bottom:30px;
}

.proposal{

font-size:clamp(1.2rem,3vw,1.6rem);

line-height:1.8;

color:#444;

margin-bottom:35px;
}

.buttons{

position:relative;

height:120px;
}

#yesBtn,
#noBtn{

padding:16px 40px;

font-size:22px;

border:none;

border-radius:50px;

cursor:pointer;

transition:.3s;
}

#yesBtn{

background:linear-gradient(
135deg,
#ff4f8b,
#ff77a9
);

color:white;

box-shadow:
0 10px 25px rgba(255,79,139,.4);
}

#yesBtn:hover{

transform:scale(1.08);
}

#noBtn{

position:absolute;

left:55%;
top:0;

background:#666;
color:white;
}

.heart{

position:fixed;

top:-20px;

pointer-events:none;

animation:fall linear infinite;
}

@keyframes fall{

to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="card">

<h1>❤️ Oii Sona ❤️</h1>

<p class="subtitle">
One Small Question... 🥺
</p>

<p class="proposal">

Amar Bou Hoba? 💍❤️

</p>

<div class="buttons">

<button id="yesBtn">
YES ❤️
</button>

<button id="noBtn">
NO 😅
</button>

</div>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(15+Math.random()*25)+"px";

heart.style.animation=
"fall "+(3+Math.random()*6)+"s linear infinite";

document.body.appendChild(heart);
}

/* Funny NO Button */

const noBtn =
document.getElementById("noBtn");

const funnyTexts=[
"NO 😅",
"Think Again 😘",
"Wrong Button 😂",
"Nice Try 😜",
"Impossible 😌",
"Just Press YES ❤️"
];

let current=0;

function escapeButton(){

const area=
document.querySelector(".buttons");

const maxX=
area.offsetWidth-180;

const maxY=50;

noBtn.style.left=
Math.random()*maxX+"px";

noBtn.style.top=
Math.random()*maxY+"px";

if(current<funnyTexts.length){

noBtn.innerHTML=
funnyTexts[current];

current++;
}
}

noBtn.addEventListener(
"mouseover",
escapeButton
);

noBtn.addEventListener(
"touchstart",
function(e){

e.preventDefault();

escapeButton();

}
);

/* YES Button */

document.getElementById("yesBtn")
.onclick=function(){

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(
135deg,
#ff9ecf,
#ffd6e8
);
padding:20px;
">

<h1 style="
font-size:clamp(3rem,8vw,6rem);
color:#ff4f8b;
">
🎉 YAYYY 🎉
</h1>

<h2 style="
font-size:clamp(1.5rem,4vw,2.5rem);
margin-top:15px;
">
❤️ Forever Starts Here ❤️
</h2>

<p style="
font-size:clamp(1.2rem,3vw,1.8rem);
margin-top:25px;
line-height:1.8;
">

Official Status Updated ✅

Amar Bou ❤️

♾️💍🥰

</p>

</div>

`;
};

</script>

</body>
</html>
