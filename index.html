<!-- PREMIUM PROPOSAL BUTTONS -->

<button id="yesBtn" class="btn">YES ❤️</button>
<button id="noBtn" class="btn">NO 😅</button>

<audio id="clickSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
</audio>

<style>

#yesBtn{
background:#ff4f8b;
color:white;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
transition:.3s;
}

#yesBtn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #ff4f8b;
}

#noBtn{
background:#777;
color:white;
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
margin-left:10px;
}

.confetti{
position:fixed;
font-size:25px;
pointer-events:none;
animation:explode 3s linear forwards;
}

@keyframes explode{

0%{
opacity:1;
transform:translateY(0) scale(1);
}

100%{
opacity:0;
transform:translateY(-500px) rotate(720deg) scale(2);
}
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
animation:flash .6s forwards;
pointer-events:none;
}

@keyframes flash{

0%{
opacity:1;
}

100%{
opacity:0;
}
}

.typewriter{
overflow:hidden;
white-space:nowrap;
border-right:3px solid #ff4f8b;
animation:
typing 4s steps(40,end),
blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{
border-color:transparent;
}
}

</style>

<script>

let texts=[
"NO 😅",
"Think Again 😘",
"Wrong Button 😂",
"Nice Try 😜",
"Impossible 😌",
"Just Press YES ❤️"
];

let index=0;

const noBtn=document.getElementById("noBtn");

function moveButton(){

const maxX=window.innerWidth-150;
const maxY=window.innerHeight-80;

noBtn.style.position="fixed";

noBtn.style.left=
Math.random()*maxX+"px";

noBtn.style.top=
Math.random()*maxY+"px";

noBtn.innerHTML=texts[index];

if(index<texts.length-1){
index++;
}
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

document.getElementById("yesBtn").onclick=function(){

document.getElementById("clickSound").play();

let flash=document.createElement("div");

flash.className="flash";

document.body.appendChild(flash);

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=
["❤️","💖","💍","✨","🌹","🎉"]
[Math.floor(Math.random()*6)];

c.style.left=Math.random()*100+"vw";

c.style.top=Math.random()*100+"vh";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},3000);
}

setTimeout(()=>{

document.body.innerHTML=`

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e8);
padding:20px;
">

<h1 style="
font-size:75px;
color:#ff4f8b;
">
🎉 SHE SAID YES 🎉
</h1>

<h2>
❤️ Bipul ♾️ Sanchari ❤️
</h2>

<p class="typewriter"
style="
font-size:26px;
color:#444;
margin-top:25px;
">

Mission: Grow Old Together 🥰

</p>

<p style="
font-size:22px;
margin-top:40px;
max-width:700px;
line-height:1.8;
">

The wait was worth it.

The conversations were worth it.

You were worth it.

Today.

Tomorrow.

Forever.

❤️

</p>

</div>

`;

},1000);
};

</script>
